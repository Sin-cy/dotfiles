style_root = "bg:surface0 fg:text"
format = ' $user '

[line_break] 
disabled = true

[character] 
disabled = false
success_symbol = '[î‍¥ ](bold fg:green)'
error_symbol = '[âœک ](bold fg:red)'
vimcmd_symbol = "[: ](bold fg:yellow)"

[package]
disabled = false

[time]
disabled = true
time_format = "%R"
format = '[[ ïگ؛ $time ](fg:yellow bg:foam)]($style)'

[custom.giturl]
description = "Display symbol for remote Git server"
command = """
GIT_REMOTE=$(command git ls-remote --get-url 2> /dev/null)
if [[ "$GIT_REMOTE" =~ "github" ]]; then
    GIT_REMOTE_SYMBOL="ïگˆ "
elif [[ "$GIT_REMOTE" =~ "gitlab" ]]; then
    GIT_REMOTE_SYMBOL="ïٹ– "
elif [[ "$GIT_REMOTE" =~ "bitbucket" ]]; then
    GIT_REMOTE_SYMBOL="ï…± "
elif [[ "$GIT_REMOTE" =~ "git" ]]; then
    GIT_REMOTE_SYMBOL="ï‍، "
else
    GIT_REMOTE_SYMBOL="ï‡’ "
fi
echo "$GIT_REMOTE_SYMBOL "
"""
when = 'git rev-parse --is-inside-work-tree 2> /dev/null'
format = "$output"
require_repo = true
ignore_timeout = true

[git_branch] 
symbol = "[î‚¶](base)ïگک "
style = "fg:lavender bg:base"
format =  '  [$symbol$branch]($style)[î‚´](base)'

# [git_status] 
# format = ' [($all_status$ahead_behind )]($style)'
# ahead    = "â‡،${count} "
# behind   = "â‡£${count} "
# diverged = "â‡•â‡،${ahead_count}â‡£${behind_count} "

[git_status]
format = '[$staged$modified$renamed$deleted$untracked$conflicted$ahead_behind]($style)'

staged     = '[+${count} ](green)'
modified   = '[!${count} ](yellow)'
renamed    = '[آ»${count} ](blue)'
deleted    = '[-${count} ](red)'
untracked  = '[?${count} ](sapphire)'
stashed    = '[â‰،${count} ](lavender)'
conflicted = '[âœ–${count} ](red bold)'

ahead      = '[â‡،${count} ](teal)'
behind     = '[â‡£${count} ](peach)'
diverged   = '[â‡•â‡،${ahead_count}â‡£${behind_count} ](mauve)'

[custom.git_worktree]
description = "Show indicator when inside a git worktree"
command = '''
if git rev-parse --git-dir >/dev/null 2>&1; then
      common_dir=$(git rev-parse --path-format=absolute --git-common-dir 2>/dev/null)
      git_dir=$(git rev-parse --path-format=absolute --git-dir 2>/dev/null)
      if [ "$common_dir" != "$git_dir" ]; then
            echo "â›“ "
      fi
fi
'''
when = 'git rev-parse --is-inside-work-tree >/dev/null 2>&1'
format = ' [$output]($style)'
style = "bold green"
require_repo = true
ignore_timeout = true


